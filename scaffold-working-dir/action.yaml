name: Scaffold a working directory
description: Scaffold a working directory
inputs:
  github_token:
    description: |
      GitHub Token
      No permission is necessary.
    required: false
    default: ${{ github.token }}
outputs:
  working_directory:
    description: Working Directory
    value: ${{steps.scaffold-working-dir.outputs.working_directory}}

runs:
  using: composite
  steps:
    - uses: suzuki-shunsuke/tfaction@0209f6642bc9ae34b6c9f5d32e0f9b35a434b7ff
      with:
        action: install
    - uses: suzuki-shunsuke/tfaction@0209f6642bc9ae34b6c9f5d32e0f9b35a434b7ff
      id: scaffold-working-dir
      with:
        action: scaffold-working-dir
      env:
        TFACTION_JOB_TYPE: scaffold_working_dir
