name: Scaffold Terraform Module
description: Scaffold Terraform Module
inputs:
  github_token:
    description: |
      GitHub Access Token
      contents:write - Create branches
      If skip_create_pr is false
      pull-requests:write - Create pull requests
    required: true

runs:
  using: composite
  steps:
    - uses: suzuki-shunsuke/tfaction@bee61a58383b8edf0ec308571ce924dc9cd142a6
      with:
        action: install
    - uses: suzuki-shunsuke/tfaction@bee61a58383b8edf0ec308571ce924dc9cd142a6
      with:
        action: scaffold-module
        github_token: ${{inputs.github_token}}
