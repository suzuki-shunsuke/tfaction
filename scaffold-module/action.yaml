name: Scaffold Terraform Module
description: Scaffold Terraform Module
inputs:
  github_token:
    description: |
      GitHub Access Token
      contents:write - Create branches
      If skip_create_pr is false
      pull-requests:write - Create pull requests
    required: true

runs:
  using: composite
  steps:
    - uses: suzuki-shunsuke/tfaction@0209f6642bc9ae34b6c9f5d32e0f9b35a434b7ff
      with:
        action: install
    - uses: suzuki-shunsuke/tfaction@0209f6642bc9ae34b6c9f5d32e0f9b35a434b7ff
      with:
        action: scaffold-module
        github_token: ${{inputs.github_token}}
